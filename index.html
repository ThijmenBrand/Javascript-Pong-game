<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Pong</title>
</head>
<body>
    <canvas id="gameCanvas" height="600" width="800"></canvas>
</body>
</html>

<script>
    var canvas = document.getElementById("gameCanvas");
    var canvasContext = canvas.getContext('2d');
    var ballY = 100;
    var ballX = 20;
    var ballSpeedX = 3;
    var ballSpeedY = 1;

    var paddle1Y;
    var paddle2Y = 250;
    const paddleHeight = 100;

    var player1Score = 0;
    var player2Score = 0;

    var winner = 10;
    var faster = 2;

    window.onload = function() {
        var framesPerSeccond = 60
        setInterval(callField => {draw(); move()}, 1000/framesPerSeccond);
        
        canvas.addEventListener('mousemove', function(evt)
        {
            var mousePos = calcMousePos(evt);
            paddle1Y = mousePos.y-(paddleHeight/2);
        })
    }

    function AI()
    {   
        var paddle2YCenter = paddle2Y+(paddleHeight/2);
        if(paddle2YCenter < ballY-35)
            paddle2Y += 6;
        else if(paddle2YCenter > ballY+35) 
            paddle2Y -= 6;
    }

    function move()
        {
            AI();

            ballX += ballSpeedX;
            ballY += ballSpeedY;
            if(ballX < 0)
                if(ballY > paddle1Y && ballY < paddle1Y+paddleHeight) {
                    ballSpeedX = -ballSpeedX; 
                    var deltaY = ballY
                                -(paddle1Y+paddleHeight/2);
                    ballSpeedY = deltaY * 0.1;
                }
                else
                {
                    player2Score ++;
                    ballReset();

                }
            if(ballX > canvas.width)
                if(ballY > paddle2Y && ballY < paddle2Y+paddleHeight) {
                    ballSpeedX = -ballSpeedX; 
                    var deltaY = ballY-(paddle2Y+paddleHeight/2);
                    ballSpeedY = deltaY * 0.1;
                }
                else
                {
                    player1Score ++;
                    ballReset();
                }
            if(ballY < 0)
                ballSpeedY = -ballSpeedY;
            if(ballY > canvas.height)
                ballSpeedY = -ballSpeedY;
        }

        function draw() {
            //background
            drawRect(0,0,canvas.width,canvas.height,"black");
            //pong1
            drawRect(0,paddle1Y,10,100,"white");
            //pong2
            drawRect(canvas.width-10,paddle2Y,10,100,"white");
            //ball
            drawCircle(ballX,ballY,5);
            //score
            canvasContext.fillText(player1Score,100,100);
            canvasContext.fillText(player2Score,canvas.width-100,100);


        }

        function ballReset()
        {
            if(player2Score >= winner || player1Score >= winner)
            {
                player2Score = 0;
                player1Score = 0;
            }

            switch(player1Score || player2Score)
            {
                case 4:
                    ballSpeedX -= faster;
                    break;
                case 8:
                    ballSpeedX -= faster;
            }
            ballSpeedX = -ballSpeedX;
            ballX = canvas.width/2;
            ballY = canvas.height/2;
        }

        function drawRect(leftX,topY,width,height,color)
        {
            canvasContext.fillStyle = color;
            canvasContext.fillRect(leftX,topY,width,height);
        }

        function drawCircle(leftX,topY,radius,color)
        {
            canvasContext.fillStyle = color;
            canvasContext.beginPath();
            canvasContext.arc(leftX,topY,radius,0,Math.PI*2,true);
            canvasContext.fill()
        }

        function calcMousePos(evt)
        {
            var rect = canvas.getBoundingClientRect();
            var root = document.documentElement;
            var mouseX = evt.clientX - rect.left - root.scrollLeft;
            var mouseY = evt.clientY - rect.top - root.scrollTop;
            return {
                x:mouseX,
                y:mouseY
            };
        }
</script>
